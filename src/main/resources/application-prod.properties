# Perfil de produção: TLS obrigatório (atrás de proxy), headers e exposição mínima.
# Cookies de sessão só por HTTPS e inacessíveis a JS.
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
# Respeita X-Forwarded-* do proxy TLS (esquema https para cookies/redirects/HSTS).
server.forward-headers-strategy=framework

# Documentação da API desligada em produção.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Migrações controladas: sem baseline silencioso em produção.
spring.flyway.baseline-on-migrate=false
