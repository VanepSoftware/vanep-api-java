# JDBC no host: porta e base alinhadas ao `.env` (POSTGRES_PORT / POSTGRES_*).
# O `make boot-run` / `make dev` fazem source do `.env` antes do `spring-boot:run`; sem `.env`, exporte as variáveis manualmente.
spring.datasource.url=jdbc:postgresql://127.0.0.1:${POSTGRES_PORT:5432}/${POSTGRES_DB:vanep}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

vanep.security.password.pepper=${VANEP_PASSWORD_PEPPER:local-dev-pepper-change-me}
