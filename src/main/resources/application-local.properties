# JDBC no host: porta e base alinhadas ao `.env` (POSTGRES_PORT / POSTGRES_*).
# O `make boot-run` / `make dev` fazem source do `.env` antes do `spring-boot:run`; sem `.env`, exporte as variáveis manualmente.
spring.datasource.url=jdbc:postgresql://127.0.0.1:${POSTGRES_PORT:5432}/${POSTGRES_DB:vanep}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Dev: pepper de fallback (se VANEP_PASSWORD_PEPPER não vier do .env) e seed do admin.
vanep.password.pepper=${VANEP_PASSWORD_PEPPER:dev-pepper-please-change}
vanep.seed.enabled=${VANEP_SEED_ENABLED:true}

# Recarrega templates Thymeleaf sem rebuild durante o desenvolvimento.
spring.thymeleaf.cache=false
