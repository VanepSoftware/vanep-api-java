spring.application.name=vanep

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Pepper: segredo da app (não vai para o BD). Em produção use env VANEP_PASSWORD_PEPPER.
vanep.security.password.pepper=${VANEP_PASSWORD_PEPPER:}
