spring.application.name=vanep

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,info

vanep.password.pepper=${VANEP_PASSWORD_PEPPER:}

vanep.oauth.client.id=${VANEP_OAUTH_CLIENT_ID:vanep-frontend}
vanep.oauth.client.redirect-uris=${VANEP_OAUTH_REDIRECT_URIS:http://localhost:3000/api/auth/callback/vanep}
vanep.oauth.client.post-logout-redirect-uris=${VANEP_OAUTH_POST_LOGOUT_REDIRECT_URIS:http://localhost:3000}
vanep.oauth.access-token-ttl-minutes=${VANEP_OAUTH_ACCESS_TOKEN_TTL_MINUTES:15}
vanep.oauth.refresh-token-ttl-days=${VANEP_OAUTH_REFRESH_TOKEN_TTL_DAYS:90}

vanep.oauth.issuer=${VANEP_OAUTH_ISSUER:}

vanep.oauth.jwk.private-key=${VANEP_OAUTH_JWK_PRIVATE_KEY:}
vanep.oauth.jwk.public-key=${VANEP_OAUTH_JWK_PUBLIC_KEY:}
vanep.oauth.jwk.key-id=${VANEP_OAUTH_JWK_KEY_ID:vanep-rsa-key}

vanep.security.login.max-attempts=${VANEP_LOGIN_MAX_ATTEMPTS:5}
vanep.security.login.lock-minutes=${VANEP_LOGIN_LOCK_MINUTES:15}
vanep.security.rate-limit.enabled=${VANEP_RATE_LIMIT_ENABLED:true}
vanep.security.rate-limit.capacity=${VANEP_RATE_LIMIT_CAPACITY:30}
vanep.security.rate-limit.window-seconds=${VANEP_RATE_LIMIT_WINDOW_SECONDS:60}

vanep.app.base-url=${VANEP_APP_BASE_URL:http://localhost:8080}

vanep.mail.enabled=${VANEP_MAIL_ENABLED:true}
vanep.mail.from=${VANEP_MAIL_FROM:no-reply@vanep.com.br}
vanep.mail.verification-ttl-hours=${VANEP_MAIL_VERIFICATION_TTL_HOURS:24}
vanep.mail.reset-ttl-minutes=${VANEP_MAIL_RESET_TTL_MINUTES:60}

vanep.remember-me.key=${VANEP_REMEMBER_ME_KEY:vanep-remember-me-change-me}

vanep.seed.enabled=${VANEP_SEED_ENABLED:false}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
