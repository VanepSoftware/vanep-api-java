<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verificar e-mail — Vanep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
  </head>
  <body>
    <main class="login-shell">
      <div class="login-card">
        <h1 class="brand">Vanep</h1>
        <p class="subtitle">Verificação de e-mail</p>

        <div class="alert alert-error">
          Link de verificação inválido ou expirado.
        </div>
        <p class="subtitle">Informe seu e-mail para receber um novo link.</p>

        <form method="post" th:action="@{/verify-email/resend}">
          <div class="field">
            <label for="email">E-mail</label>
            <input
              id="email"
              type="email"
              name="email"
              required
              autofocus
              autocomplete="email"
              placeholder="seu@email.com"
            />
          </div>
          <button type="submit" class="btn-submit">Reenviar verificação</button>
        </form>

        <a class="forgot" th:href="@{/login}">Voltar ao login</a>
      </div>
    </main>
  </body>
</html>
