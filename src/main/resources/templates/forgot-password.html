<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recuperar senha — Vanep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
  </head>
  <body>
    <main class="login-shell">
      <div class="login-card">
        <h1 class="brand">Vanep</h1>
        <p class="subtitle">Recuperar senha</p>
        <p class="subtitle">
          Informe seu e-mail e enviaremos um link para redefinir a senha.
        </p>

        <form method="post" th:action="@{/forgot-password}" th:object="${forgotPasswordForm}">
          <div class="field">
            <label for="email">E-mail</label>
            <input
              id="email"
              type="email"
              th:field="*{email}"
              required
              autofocus
              autocomplete="email"
              placeholder="seu@email.com"
            />
            <p class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
          </div>

          <button type="submit" class="btn-submit">Enviar link</button>
        </form>

        <a class="forgot" th:href="@{/login}">Voltar ao login</a>
      </div>
    </main>
  </body>
</html>
