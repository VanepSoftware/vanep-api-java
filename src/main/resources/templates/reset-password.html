<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redefinir senha — Vanep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
  </head>
  <body>
    <main class="login-shell">
      <div class="login-card">
        <h1 class="brand">Vanep</h1>
        <p class="subtitle">Definir nova senha</p>

        <div class="alert alert-error" th:if="${invalid}">
          Link inválido ou expirado.
          <a th:href="@{/forgot-password}">Solicitar um novo</a>.
        </div>

        <form
          th:unless="${invalid}"
          method="post"
          th:action="@{/reset-password}"
          th:object="${resetPasswordForm}"
        >
          <div class="alert alert-error" th:if="${#fields.hasGlobalErrors()}">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
          </div>

          <input type="hidden" th:field="*{token}" />

          <div class="field">
            <label for="password">Nova senha</label>
            <input
              id="password"
              type="password"
              th:field="*{password}"
              required
              autocomplete="new-password"
              placeholder="••••••••"
            />
            <p
              class="form-error"
              th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}"
            ></p>
          </div>

          <div class="field">
            <label for="confirmPassword">Confirmar senha</label>
            <input
              id="confirmPassword"
              type="password"
              th:field="*{confirmPassword}"
              required
              autocomplete="new-password"
              placeholder="••••••••"
            />
            <p
              class="form-error"
              th:if="${#fields.hasErrors('confirmPassword')}"
              th:errors="*{confirmPassword}"
            ></p>
          </div>

          <button type="submit" class="btn-submit">Redefinir senha</button>
        </form>

        <a class="forgot" th:href="@{/login}">Voltar ao login</a>
      </div>
    </main>
  </body>
</html>
