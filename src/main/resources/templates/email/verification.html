<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
  </head>
  <body style="font-family: Arial, Helvetica, sans-serif; color: #111">
    <h2>Bem-vindo à Vanep</h2>
    <p th:text="'Olá, ' + ${name} + '!'">Olá!</p>
    <p>Confirme seu e-mail para ativar sua conta:</p>
    <p>
      <a
        th:href="${link}"
        style="
          display: inline-block;
          padding: 12px 20px;
          background: #111;
          color: #fff;
          border-radius: 8px;
          text-decoration: none;
        "
        >Confirmar e-mail</a
      >
    </p>
    <p>Se o botão não funcionar, copie e cole este endereço no navegador:</p>
    <p><a th:href="${link}" th:text="${link}">link</a></p>
    <p style="color: #666; font-size: 12px">
      Se você não criou uma conta na Vanep, ignore este e-mail.
    </p>
  </body>
</html>
