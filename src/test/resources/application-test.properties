spring.datasource.url=${TEST_DATASOURCE_URL:jdbc:h2:mem:vanep;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${TEST_DATASOURCE_USERNAME:sa}
spring.datasource.password=${TEST_DATASOURCE_PASSWORD:}

# Em teste o schema vem das entidades JPA (Flyway desligado; SQL é específico de Postgres).
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Valores fixos para os testes de autenticação.
vanep.password.pepper=test-pepper
vanep.remember-me.key=test-remember-me-key
vanep.oauth.client.id=vanep-frontend
vanep.oauth.client.redirect-uris=http://localhost:3000/api/auth/callback/vanep

# E-mail e rate limit desligados nos testes (sem SMTP; o filtro não roda no MockMvc).
vanep.mail.enabled=false
vanep.security.rate-limit.enabled=false

# Credenciais dummy do Google para habilitar o login social nos testes.
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-secret
spring.security.oauth2.client.registration.google.scope=openid,email,profile
