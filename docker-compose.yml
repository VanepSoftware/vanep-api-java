services:
  postgres:
    image: postgres:17-alpine
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - vanep-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  vanep:
    build:
      context: .
      dockerfile: Dockerfile
    image: vanep-api:local
    env_file: .env
    ports:
      - "${APP_PORT}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      # Mail vem do .env (env_file). Sem MAIL_HOST definido, o profile docker usa
      # mailpit como default (dev). Em produção, defina MAIL_* no .env (SMTP real).
      JAVA_OPTS: "${JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  vanep-postgres-data:
