services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vanep
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vanep-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vanep"]
      interval: 5s
      timeout: 5s
      retries: 5

  vanep:
    build:
      context: .
      dockerfile: Dockerfile
    image: vanep-api:local
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      JAVA_OPTS: "${JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  vanep-postgres-data:
