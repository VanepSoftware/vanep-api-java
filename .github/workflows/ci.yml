name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint + testes + JaCoCo (Spotless + cobertura ≥ 75% linhas)
        run: chmod +x gradlew && ./gradlew check --no-daemon

      - name: Upload relatório JaCoCo (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html
          path: build/reports/jacoco/test/html/

      - name: Build imagem Docker
        run: docker build -t vanep-api:ci .

      - name: Smoke test — app no Docker responde em GET /
        run: |
          set -euo pipefail
          cid=$(docker run -d -p 8080:8080 vanep-api:ci)
          cleanup() { docker rm -f "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -fsS --max-time 3 "http://127.0.0.1:8080/" | grep -qx 'vanep'; then
              echo "Smoke OK: GET / retorna vanep"
              exit 0
            fi
            sleep 2
          done
          echo "Smoke falhou — logs do container:"
          docker logs "$cid" || true
          exit 1
