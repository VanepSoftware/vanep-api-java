name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: [self-hosted, vanep]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Lint + testes + JaCoCo (Spotless + cobertura ≥ 75% linhas)
        run: chmod +x mvnw && ./mvnw verify -B

      - name: Upload relatório JaCoCo (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html
          path: target/site/jacoco/
