name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, vanep]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        working-directory: /home/vanep/vanep-projects/vanep-api-java
        run: |
          git pull origin main
          docker compose build --no-cache
          docker compose up -d
          echo "Deploy concluído!"

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "API respondendo com status $STATUS"
          else
            echo "API retornou status $STATUS"
            exit 1
          fi
